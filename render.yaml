services:
  - type: web
    name: agentmem-api
    runtime: python
    plan: standard
    region: oregon
    branch: master
    buildCommand: pip install -e ".[otel]"
    # Migrations run here (not as a separate worker): preDeploy runs after the
    # build and before the new version goes live. alembic.ini uses relative
    # paths (script_location=alembic, prepend_sys_path=.), so it must run from
    # inside agentmem/.
    preDeployCommand: cd agentmem && alembic upgrade head
    startCommand: uvicorn lians.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentmem-pg
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agentmem-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_PROVIDER
        value: voyage
      - key: VOYAGE_API_KEY
        sync: false          # set in Render dashboard
      - key: MASTER_ENCRYPTION_KEY
        generateValue: true  # base64 256-bit — decodes to 32 bytes; pinned forever
      - key: ADMIN_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPERSESSION_LLM_STAGE
        value: "true"
      - key: RECALL_CACHE_ENABLED
        value: "true"
      - key: RECALL_CACHE_TTL_SECONDS
        value: "60"
      - key: SUPERSESSION_REVIEW_THRESHOLD
        value: "0.75"
      - key: OTEL_SERVICE_NAME
        value: agentmem
      - key: PYTHONPATH
        value: agentmem/src

  # Redis is a service (type: redis), not a database entry.
  - type: redis
    name: agentmem-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

databases:
  - name: agentmem-pg
    plan: standard
    region: oregon
    databaseName: agentmem
    user: agentmem
